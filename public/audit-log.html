<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audit Log — Fierce Health</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script src="data.js"></script>
  <link rel="stylesheet" href="theme.css" />
</head>
<body class="bg-slate-950 min-h-screen text-slate-100">

  <!-- Navbar -->
  <nav class="bg-slate-900/95 border-b border-slate-800 px-4 sm:px-6 py-3 sm:py-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 shadow-lg backdrop-blur">
    <a href="index.html" class="flex items-center gap-2">
      <svg class="w-6 h-6 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
      </svg>
      <span class="font-bold text-lg tracking-tight">Fierce Health</span>
      <span class="text-slate-400 font-normal text-sm ml-1">— Fulfillment Autopilot</span>
    </a>
    <div class="flex flex-wrap items-center gap-3 sm:gap-6 text-xs sm:text-sm font-medium">
      <a href="index.html" class="text-slate-300 hover:text-white transition-colors">Dashboard</a>
      <a href="audit-log.html" class="text-white border-b-2 border-emerald-400 pb-0.5">Audit Log</a>
      <a href="flags.html" class="text-slate-300 hover:text-white transition-colors">Flags</a>
      <button id="theme-toggle" onclick="toggleTheme()" class="text-xs px-2.5 py-1 rounded border border-slate-700 text-slate-300 hover:text-white">Light</button>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-8 space-y-4">

    <div class="mb-6">
      <h1 class="text-2xl font-bold text-white">Audit Log — Fulfillment Actions</h1>
      <p class="text-slate-400 mt-1 text-sm">Immutable feed of every tracking push and matching outcome.</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
      <div class="bg-slate-900 border border-slate-800 rounded-xl p-4">
        <div class="text-xs text-slate-400">Fulfillment Events</div>
        <div id="metric-events" class="text-2xl font-semibold text-emerald-300 mt-1">0</div>
      </div>
      <div class="bg-slate-900 border border-slate-800 rounded-xl p-4">
        <div class="text-xs text-slate-400">Customer Notified</div>
        <div id="metric-notified" class="text-2xl font-semibold text-amber-300 mt-1">0</div>
      </div>
    </div>

    <!-- Search -->
    <div class="bg-slate-900 border border-slate-800 rounded-xl shadow-md p-4 mb-4">
      <div class="relative">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input
          id="search-input"
          type="text"
          placeholder="Search by order # or patient name..."
          class="w-full pl-9 pr-4 py-2.5 bg-slate-950 border border-slate-700 rounded-lg text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent"
          oninput="filterTable()"
        />
      </div>
    </div>

    <!-- Table -->
    <div class="bg-slate-900 border border-slate-800 rounded-xl shadow-md overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-slate-900 border-b border-slate-800">
            <tr class="text-left text-slate-400">
              <th class="px-4 py-3 font-medium">Timestamp</th>
              <th class="px-4 py-3 font-medium">Order #</th>
              <th class="px-4 py-3 font-medium">Patient</th>
              <th class="px-4 py-3 font-medium hidden sm:table-cell">Product</th>
              <th class="px-4 py-3 font-medium">Tracking Number</th>
              <th class="px-4 py-3 font-medium hidden md:table-cell">Carrier</th>
              <th class="px-4 py-3 font-medium hidden md:table-cell">Source</th>
              <th class="px-4 py-3 font-medium">Shopify Status</th>
            </tr>
          </thead>
          <tbody id="audit-table"></tbody>
        </table>
      </div>
      <div id="no-results" class="hidden py-12 text-center text-slate-500 text-sm">No results found.</div>
    </div>

    <div class="mt-4 text-xs text-slate-500 text-right" id="result-count"></div>
  </main>

  <script>
    function applyTheme(theme) {
      document.body.classList.toggle('light-theme', theme === 'light');
      const toggle = document.getElementById('theme-toggle');
      if (toggle) toggle.textContent = theme === 'light' ? 'Dark' : 'Light';
    }
    function initTheme() {
      applyTheme(localStorage.getItem('fh-theme') || 'dark');
    }
    function toggleTheme() {
      const next = document.body.classList.contains('light-theme') ? 'dark' : 'light';
      localStorage.setItem('fh-theme', next);
      applyTheme(next);
    }
    initTheme();

    function renderTable(data) {
      const tbody = document.getElementById('audit-table');
      tbody.innerHTML = '';
      data.forEach((entry, i) => {
        const row = document.createElement('tr');
        row.className = `audit-row border-b border-slate-800 last:border-0 ${i % 2 === 0 ? 'bg-slate-900' : 'bg-slate-950/70'} hover:bg-slate-800/60 transition-colors`;
        row.dataset.search = `${entry.orderId} ${entry.patient}`.toLowerCase();
        row.innerHTML = `
          <td class="px-4 py-3 text-slate-400 whitespace-nowrap font-mono text-xs">${entry.time}</td>
          <td class="px-4 py-3 font-semibold text-slate-100 whitespace-nowrap">
            <a href="order-detail.html?id=${entry.orderId}" class="hover:text-sky-400 transition-colors">${entry.orderId}</a>
          </td>
          <td class="px-4 py-3 text-slate-300 whitespace-nowrap">${entry.patient}</td>
          <td class="px-4 py-3 text-slate-400 hidden sm:table-cell max-w-xs truncate">${entry.product}</td>
          <td class="px-4 py-3 font-mono text-xs text-slate-300 whitespace-nowrap">${entry.tracking}</td>
          <td class="px-4 py-3 hidden md:table-cell">
            <span class="inline-flex items-center gap-1 text-xs font-medium px-2 py-1 rounded-full ${entry.carrier === 'UPS' ? 'bg-amber-900/40 text-amber-200' : 'bg-violet-900/40 text-violet-200'}">
              ${entry.carrier}
            </span>
          </td>
          <td class="px-4 py-3 text-slate-400 hidden md:table-cell whitespace-nowrap">${entry.source}</td>
          <td class="px-4 py-3 whitespace-nowrap">
            <span class="inline-flex items-center gap-1 bg-emerald-900/40 text-emerald-300 text-xs font-semibold px-2.5 py-1 rounded-full">
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
              Fulfilled
            </span>
          </td>
        `;
        tbody.appendChild(row);
      });
      updateCount(data.length);
    }

    function filterTable() {
      const query = document.getElementById('search-input').value.toLowerCase().trim();
      const rows = document.querySelectorAll('.audit-row');
      let visible = 0;
      rows.forEach(row => {
        const match = !query || row.dataset.search.includes(query);
        row.style.display = match ? '' : 'none';
        if (match) visible++;
      });
      document.getElementById('no-results').classList.toggle('hidden', visible > 0);
      updateCount(visible);
    }

    function updateCount(n) {
      document.getElementById('result-count').textContent = `${n} record${n !== 1 ? 's' : ''}`;
    }

    document.getElementById('metric-events').textContent = AUDIT_LOG.length;
    document.getElementById('metric-notified').textContent = AUDIT_LOG.filter(e => e.notifyCustomer).length;
    renderTable(AUDIT_LOG);
  </script>
</body>
</html>
